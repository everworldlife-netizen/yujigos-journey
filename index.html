<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#120d24" />
    <meta name="description" content="Yujigo's Journey - a polished match-3 adventure." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Yujigo's Journey</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at top, #382657 0%, #120d24 60%, #080511 100%);
        touch-action: none;
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #fff4ff;
        text-shadow: 0 3px 0 #2a173e;
        font-size: 24px;
        letter-spacing: 1px;
        z-index: 2;
      }
      canvas {
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading Berry Magic…</div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', () => {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
      });
    </script>
  </body>
</html>
